<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to VolunConnect</title>
    <style>
        /* Base Reset & Font */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        /* Main Card Container */
        .container { 
            background: #fff; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            display: flex; 
            max-width: 900px; 
            width: 100%; 
            overflow: hidden; 
            position: relative;
        }

        /* Left Branding Panel */
        .left-panel { 
            background: linear-gradient(135deg, #1a56db, #2151D8); 
            color: white; 
            padding: 50px; 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
        }
        .left-panel h1 { font-size: 38px; margin-bottom: 15px; font-weight: 800; }
        .left-panel p { font-size: 16px; opacity: 0.9; line-height: 1.6; margin-bottom: 20px;}
        .glass-badge {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 8px;
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 14px;
            width: fit-content;
        }

        /* Right Form Panel */
        .right-panel { padding: 50px; flex: 1.2; background: #ffffff; }
        .right-panel h2 { color: #333; margin-bottom: 25px; font-size: 28px; }
        
        /* Form Inputs */
        .form-group { margin-bottom: 18px; transition: all 0.3s ease; }
        .form-group label { display: block; margin-bottom: 8px; color: #555; font-size: 14px; font-weight: 600; }
        .form-group input { 
            width: 100%; 
            padding: 14px; 
            border: 1.5px solid #e1e5ee; 
            border-radius: 10px; 
            font-size: 14px; 
            transition: 0.3s; 
            background: #fafbfc;
        }
        .form-group input:focus { 
            border-color: #1a56db; 
            background: #fff;
            outline: none; 
            box-shadow: 0 0 0 4px rgba(26,86,219,0.1); 
        }

        /* Submit Button */
        .submit-btn { 
            background: #1a56db; 
            color: white; 
            border: none; 
            padding: 14px; 
            width: 100%; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            margin-top: 15px; 
            box-shadow: 0 4px 15px rgba(26,86,219,0.2);
        }
        .submit-btn:hover { background: #1545b3; transform: translateY(-2px); }

        /* Toggle Links */
        .toggle-link { text-align: center; margin-top: 25px; font-size: 14px; color: #666; }
        .toggle-link a { color: #1a56db; text-decoration: none; font-weight: bold; cursor: pointer; transition: 0.2s;}
        .toggle-link a:hover { text-decoration: underline; color: #1545b3; }
        
        .hidden { display: none; }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .left-panel { padding: 40px 30px; text-align: center; }
            .glass-badge { margin: 0 auto; }
            .right-panel { padding: 40px 30px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="left-panel">
            <h1>VolunConnect✌️</h1>
            <div class="glass-badge">Connecting Hearts, Serving Communities</div>
        </div>

        <div class="right-panel">
            <h2 id="form-title">Create an Account</h2>
            
            <form action="/signup" method="POST">
                
                <div class="form-group signup-only">
                    <label>Full Name</label>
                    <input type="text" name="FullName" placeholder="e.g. John Doe">
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="Username" placeholder="name@example.com" required>
                </div>

                <div class="form-group signup-only">
                    <label>Phone Number</label>
                    <input type="tel" name="Phone" placeholder="+91 98765 43210">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="Password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="submit-btn" id="submit-btn">Sign Up</button>

                <div class="toggle-link">
                    <span id="toggle-text">Already have an account?</span> 
                    <a href="/">Login here</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        let isLogin = false; // By default, show Sign Up
        
        function toggleForm() {
            isLogin = !isLogin;
            const signupFields = document.querySelectorAll('.signup-only');
            const title = document.getElementById('form-title');
            const btn = document.getElementById('submit-btn');
            const text = document.getElementById('toggle-text');
            const action = document.getElementById('toggle-action');

            if (isLogin) {
                // Switch to Login View
                signupFields.forEach(f => f.classList.add('hidden'));
                title.innerText = "Welcome Back";
                btn.innerText = "Secure Login";
                text.innerText = "Don't have an account?";
                action.innerText = "Sign up here";
            } else {
                // Switch to Sign Up View
                signupFields.forEach(f => f.classList.remove('hidden'));
                title.innerText = "Create an Account";
                btn.innerText = "Sign Up";
                text.innerText = "Already have an account?";
                action.innerText = "Login here";
            }
        }
    </script>

</body>
</html>
